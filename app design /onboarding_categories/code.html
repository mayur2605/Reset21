                RESET_V.01
            </div>
<h1 class="font-headline font-black text-5xl md:text-7xl leading-none tracking-tighter uppercase text-[#1C293C]">
                Start Your Reset
            </h1>
<p class="font-label text-xl md:text-2xl text-on-surface-variant max-w-xl">
                Choose your focus area for the next 21 days.
            </p>
</header>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest border-[3px] border-[#1C293C] neobrutal-shadow transition-all active-press hover:bg-primary-container/10">
<div class="w-14 h-14 bg-primary-container border-[3px] border-[#1C293C] flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">exercise</span>
</div>
<h3 class="font-headline font-extrabold text-2xl uppercase mb-2 tracking-tight">Fitness</h3>
<p class="font-body text-sm text-on-surface-variant text-left">Physical discipline, strength training, and metabolic health.</p>
<div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary-fixed-dim">arrow_outward</span>
</div>
</button>
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest border-[3px] border-[#1C293C] neobrutal-shadow transition-all active-press hover:bg-secondary-container/10">
<div class="w-14 h-14 bg-secondary-dim border-[3px] border-[#1C293C] flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-3xl text-on-secondary" style="font-variation-settings: 'FILL' 1;">laptop_mac</span>
</div>
<h3 class="font-headline font-extrabold text-2xl uppercase mb-2 tracking-tight">Productivity</h3>
<p class="font-body text-sm text-on-surface-variant text-left">Deep work protocols, cognitive performance, and system building.</p>
<div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-secondary-dim">arrow_outward</span>
</div>
</button>
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest border-[3px] border-[#1C293C] neobrutal-shadow transition-all active-press hover:bg-tertiary-container/10">
<div class="w-14 h-14 bg-tertiary border-[3px] border-[#1C293C] flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-3xl text-on-tertiary" style="font-variation-settings: 'FILL' 1;">phonelink_off</span>
</div>
<h3 class="font-headline font-extrabold text-2xl uppercase mb-2 tracking-tight">Dopamine Detox</h3>
<p class="font-body text-sm text-on-surface-variant text-left">Screen-time reduction, focus restoration, and mental clarity.</p>
<div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-tertiary">arrow_outward</span>
</div>
</button>

<span class="material-symbols-outlined text-3xl text-on-error" style="font-variation-settings: 'FILL' 1;">coffee</span>
</div>

<div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-error">arrow_outward</span>
