<div class="absolute inset-0 pointer-events-none z-0">
<div class="absolute top-10 left-10 w-24 h-24 bg-tertiary-fixed border-4 border-stone-900 rotate-12 opacity-40"></div>
<div class="absolute bottom-20 right-10 w-32 h-32 bg-secondary border-4 border-stone-900 -rotate-12 opacity-30"></div>

<div class="absolute top-20 right-1/4 w-8 h-8 bg-error border-2 border-stone-900 rounded-full opacity-40"></div>
</div>
<!-- End of Day Reward Card -->
<div class="max-w-md w-full bg-surface-container-lowest border-[4px] border-stone-900 neobrutal-shadow p-8 relative z-10 flex flex-col items-center text-center">
<!-- Progress Tag -->
<div class="font-label text-xs font-bold uppercase tracking-widest bg-stone-900 text-white px-4 py-1 mb-6">
                Day Progress: Day 04 of 21
            </div>
<!-- Score Visual -->
<div class="mb-2">
<span class="font-mono text-8xl md:text-9xl font-extrabold text-stone-900 tracking-tighter">7/10</span>
</div>

<span class="font-mono font-bold text-stone-900">🔥 5 DAY STREAK</span>
</div>
<div class="bg-secondary text-white border-2 border-stone-900 neobrutal-shadow-sm px-4 py-2 flex items-center gap-2">

</div>
</div>

                </button>
<button class="w-full kinetic-press bg-white border-[3px] border-stone-900 py-4 font-label font-bold text-lg uppercase tracking-tight text-stone-900">
                    CONTINUE TOMORROW
                </button>
</div>

<div class="mt-8 pt-6 border-t-2 border-stone-200 w-full italic font-body text-stone-500 text-sm">
